# Test configuration for nnterp test suite
# This file contains model lists and skip patterns for testing

# Models with llama-like naming conventions
llama_like_models:
  - sbintuitions/tiny-lm-chat
  - Maykeye/TinyLLama-v0
  - axolotl-ai-co/gemma-3-34M
  - yujiepan/gemma-tiny-random
  - yujiepan/llama-4-tiny-random
  - yujiepan/llama-3.3-tiny-random
  - yujiepan/llama-2-tiny-random
  - yujiepan/mistral-tiny-random
  - yujiepan/deepseek-llm-tiny-random
  - yujiepan/phi-3-tiny-random
  - yujiepan/phi-3.5-moe-tiny-random
  - yujiepan/qwen1.5-tiny-random
  - yujiepan/qwen2-tiny-random
  - yujiepan/qwen2.5-tiny-random
  - yujiepan/qwen3-tiny-random
  - yujiepan/mistral-nemo-2407-tiny-random

# Core test models
core_test_models:
  - gpt2
  - bigscience/bigscience-small-testing
  - yujiepan/opt-tiny-2layers-random
  - yujiepan/mixtral-8xtiny-random
  - yujiepan/qwen1.5-moe-tiny-random
  - yujiepan/qwen3-moe-tiny-random

# Substring patterns to skip models known to fail tests
# Any model containing these substrings will be skipped
skip_patterns:
  - whisper  # audio model
  - mamba  # state-space model, not a transformer
  - bamba  # state-space model, not a transformer
  - lfm2  # state-space model, not a transformer
  - granite-4.0-h  # hybrid SSM/transformer, not supported
  - granite-moe-hybrid  # hybrid SSM/transformer, not supported
  - tiny-random-bert  # encoder-only, not supported
  - gemma-3n  # AltUp 4D hidden states, see issue #35
  - llama-3.2-vision  # heterogeneous layers (cross-attn only fires with images)
  - falcon-h1  # hybrid SSM/transformer, not supported
  - jamba  # hybrid SSM/transformer, not supported

# Test file categorization for failure tracking
# Maps category names (middle part only) to their test files
# These will be used to create:
#   - "failed_{category}_models" for failure tracking
#   - "no_{category}_available_models" for partial availability
test_file_categories:
  attn_probs:
    - test_probabilities.py
  intervention:
    - test_interventions.py
  prompt_utils:
    - test_prompt_utils.py
